name: supabase_auth_ui
description: UI library to implement auth forms using Supabase and Flutter
version: 0.6.1
homepage: https://supabase.com
repository: 'https://github.com/supabase-community/supabase_auth_ui'

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

workspace:
  - example

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.15.0
  email_validator: ^3.0.0
  font_awesome_flutter: ^11.0.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  http: ^1.0.0
  melos: ^8.0.0
  supabase_lints: ^0.1.0

melos:
  useRootAsPackage: true

  scripts:
    analyze:
      run: flutter analyze --fatal-warnings --fatal-infos lib test example/lib
      description: Run static analysis on the package.
    format:
      run: dart format lib test example/lib --set-exit-if-changed
      description: Verify that the code is formatted.
    format:fix:
      run: dart format lib test example/lib
      description: Format the code.
    test:
      run: flutter test
      description: Run the tests.
    lint:all:
      run: melos run analyze && melos run format
      description: Run all static analysis checks.

flutter:
  generate: true
  assets:
    - assets/logos/

screenshots:
  - description: Supabase Auth UI
    path: screenshots/supabase_auth_ui.png
